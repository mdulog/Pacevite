server {
    listen 8080;

    # Health check — exposed for external monitors; no auth required by design
    location /health {
        proxy_pass         http://api:5291/health;
        proxy_http_version 1.1;
        proxy_set_header   Host               $http_host;
    }

# API traffic — keep the /api prefix so ASP.NET Core routing matches unchanged
    location /api/ {
        proxy_pass         http://api:5291/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host               $http_host;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }

    # SPA — all other requests go to the web container
    location / {
        proxy_pass         http://web:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host               $http_host;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    }
}
